services:
  - type: web
    name: salaryiq
    env: python
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT"
    envVars:
      - key: DB_BACKEND
        value: sqlite           # change to mysql if using Render MySQL
      # Uncomment below when using Render MySQL add-on:
